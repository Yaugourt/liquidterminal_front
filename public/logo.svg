<svg xmlns="http://www.w3.org/2000/svg" viewBox="-17 63 656 656" fill="none" role="img" aria-label="Liquid Terminal">
  <!--
    Canonical Liquid Terminal mark. Kept byte-compatible with <LiquidMark>
    (src/components/common/LiquidMark.tsx): same geometry, same viewBox, same
    colors, so the file asset and the inline component never drift.

    Two deliberate differences from the Illustrator export this replaces:
      - the arc is the V4 brand token #83E9FF, not the legacy #93D4ED;
      - no <style> block. Generic .cls-1/2/3 class names collide as soon as
        two copies of the file are inlined on one page.

    The terminal-cursor rectangle of the full lockup is out of frame here. At
    the sizes this file is used (16-64px: favicon, sidebar, Privy) it renders
    as a 1-3px speck. The lockup with the cursor lives in dash-mockups/brand/.
  -->
  <polygon points="462.14 405.28 437.5 405.28 386.14 311.63 310.14 173.05 234.15 311.63 182.79 405.28 158.15 405.28 234.15 266.7 310.14 128.13 386.14 266.7 462.14 405.28" fill="#E8EAED" stroke="#E8EAED" stroke-width="28.92" stroke-miterlimit="10"/>
  <path d="m478.82,491.36c0,89.4-75.3,161.86-168.17,161.86s-168.18-72.46-168.18-161.86h26.62c0,74.76,62.98,135.35,140.65,135.35s140.63-60.59,140.63-135.35h28.44Z" fill="#83E9FF" stroke="#83E9FF" stroke-width="30.43" stroke-miterlimit="10"/>
</svg>
